name: Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pixel-android-app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/racecraft-latest.apk
      - uses: actions/upload-artifact@v4
        with:
          name: racecraft-apk
          path: pixel-android-app/artifacts/racecraft-latest.apk
          retention-days: 90

  publish-release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: racecraft-apk
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/racecraft-latest.apk
          name: Racecraft ${{ github.ref_name }}
          body: |
            ## Direct Download

            Download `racecraft-latest.apk` below and install on a Pixel device
            (Android 10+ / API 29+). Enable "Install from unknown sources" in
            Settings if prompted.

            See the [blog series](https://rkrants.blogspot.com/2026/06/racecraft-project-koru-prologue-origin.html) for background.
          draft: false
          prerelease: false
