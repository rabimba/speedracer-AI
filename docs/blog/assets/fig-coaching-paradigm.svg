<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1000" height="520" rx="14" fill="#080b14"/>
  <text x="40" y="48" fill="#eaf0ff" font-size="24" font-weight="800">The coaching paradigm</text>
  <text x="40" y="74" fill="#6b7aa3" font-size="13">The DriverModel reads the driver, not just the car — and that read modulates everything the coach says.</text>

  <!-- input metrics -->
  <g transform="translate(40,110)">
    <rect x="0" y="0" width="220" height="150" rx="12" fill="#111829" stroke="#1e2942"/>
    <text x="16" y="28" fill="#eaf0ff" font-size="13" font-weight="800">DriverModel</text>
    <text x="16" y="52" fill="#9fb0d6" font-size="11.5">10&#160;s rolling window</text>
    <text x="16" y="72" fill="#9fb0d6" font-size="11.5">5&#160;s hysteresis (no flicker)</text>
    <text x="16" y="100" fill="#6b7aa3" font-size="11" font-weight="700">SIGNALS</text>
    <text x="16" y="120" fill="#cdd8f5" font-size="11.5">• input smoothness (jerk)</text>
    <text x="16" y="138" fill="#cdd8f5" font-size="11.5">• coasting ratio</text>
  </g>
  <line x1="260" y1="185" x2="320" y2="185" stroke="#6b7aa3" stroke-width="2" marker-end="url(#a2)"/>
  <defs><marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7aa3"/></marker></defs>

  <!-- classification -->
  <g transform="translate(325,120)" font-size="12" font-weight="700" text-anchor="middle">
    <rect x="0" y="0" width="150" height="40" rx="20" fill="#1c1408" stroke="#ffb454"/><text x="75" y="25" fill="#ffb454">BEGINNER</text>
    <rect x="0" y="50" width="150" height="40" rx="20" fill="#0b1722" stroke="#38bdf8"/><text x="75" y="75" fill="#38bdf8">INTERMEDIATE</text>
    <rect x="0" y="100" width="150" height="40" rx="20" fill="#10231b" stroke="#00e08a"/><text x="75" y="125" fill="#00e08a">ADVANCED</text>
  </g>
  <line x1="475" y1="185" x2="535" y2="185" stroke="#6b7aa3" stroke-width="2" marker-end="url(#a2)"/>

  <!-- adaptation table -->
  <g transform="translate(540,96)">
    <rect x="0" y="0" width="420" height="300" rx="12" fill="#0c111d" stroke="#1e2942"/>
    <text x="16" y="28" fill="#eaf0ff" font-size="13" font-weight="800">What changes</text>
    <g font-size="11.5">
      <text x="16" y="66" fill="#6b7aa3" font-weight="700">LANGUAGE</text>
      <text x="150" y="66" fill="#ffb454">"Squeeze the brakes"</text>
      <text x="150" y="84" fill="#00e08a">"Brake spike — modulate"</text>

      <text x="16" y="120" fill="#6b7aa3" font-weight="700">CADENCE</text>
      <text x="150" y="120" fill="#ffb454">3000&#160;ms cooldown + apex blackout</text>
      <text x="150" y="138" fill="#00e08a">650&#160;ms cooldown, no blackout</text>

      <text x="16" y="174" fill="#6b7aa3" font-weight="700">PROGRESSION</text>
      <text x="150" y="174" fill="#ffb454">trail-braking suppressed early</text>
      <text x="150" y="192" fill="#00e08a">full action set immediately</text>

      <text x="16" y="228" fill="#6b7aa3" font-weight="700">LLM PROMPT</text>
      <text x="150" y="228" fill="#ffb454">"simple, feel-based sentences"</text>
      <text x="150" y="246" fill="#00e08a">"reference the telemetry numbers"</text>
    </g>
    <text x="16" y="284" fill="#6b7aa3" font-size="10.5">amber = beginner framing · green = advanced framing</text>
  </g>

  <!-- persona row -->
  <rect x="40" y="430" width="920" height="58" rx="12" fill="#111829" stroke="#1e2942"/>
  <text x="60" y="455" fill="#eaf0ff" font-size="12" font-weight="800">Same moment, four voices (persona layer)</text>
  <g font-size="12" transform="translate(60,476)">
    <text x="0" y="0" fill="#9fb0d6">AJ: <tspan fill="#eaf0ff">"Brake. Now."</tspan></text>
    <text x="200" y="0" fill="#9fb0d6">Tony: <tspan fill="#eaf0ff">"Brake! Trust the tires!"</tspan></text>
    <text x="470" y="0" fill="#9fb0d6">Rachel: <tspan fill="#eaf0ff">"Trail brake. Keep front load."</tspan></text>
  </g>
</svg>
