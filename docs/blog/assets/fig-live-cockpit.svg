<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/><stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00e08a"/><stop offset="1" stop-color="#00b974"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0" stop-color="rgba(0,224,138,0.18)"/><stop offset="1" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="720" fill="url(#bg)"/>
  <rect width="1000" height="720" fill="url(#glow)"/>

  <!-- Phone frame -->
  <g transform="translate(60,40)">
    <rect x="0" y="0" width="420" height="640" rx="40" fill="#0c111d" stroke="#1e2942" stroke-width="2"/>
    <rect x="14" y="16" width="392" height="608" rx="28" fill="#080b14" stroke="#15203a" stroke-width="1.5"/>

    <!-- status bar -->
    <g transform="translate(34,42)">
      <circle cx="6" cy="6" r="6" fill="#00e08a"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
      <text x="22" y="11" fill="#eaf0ff" font-size="14" font-weight="700">RACECRAFT · LIVE</text>
      <text x="300" y="11" fill="#9fb0d6" font-size="12" font-family="JetBrains Mono, monospace">12:04.7</text>
    </g>
    <!-- source chips -->
    <g transform="translate(34,66)" font-size="10.5" font-weight="600">
      <rect x="0" y="0" width="86" height="22" rx="11" fill="#111829" stroke="#1e2942"/><text x="43" y="15" fill="#38bdf8" text-anchor="middle">RaceBox BLE</text>
      <rect x="94" y="0" width="74" height="22" rx="11" fill="#111829" stroke="#1e2942"/><text x="131" y="15" fill="#9fb0d6" text-anchor="middle">GPS · IMU</text>
      <rect x="176" y="0" width="120" height="22" rx="11" fill="#10231b" stroke="rgba(0,224,138,0.4)"/><text x="236" y="15" fill="#00e08a" text-anchor="middle">Gemma 4 E2B · edge</text>
    </g>

    <!-- speed cluster -->
    <g transform="translate(34,108)">
      <text x="0" y="14" fill="#6b7aa3" font-size="11" font-weight="600">SPEED</text>
      <text x="0" y="64" fill="#eaf0ff" font-size="58" font-weight="800" font-family="JetBrains Mono, monospace">128</text>
      <text x="150" y="64" fill="#9fb0d6" font-size="16">km/h</text>
      <!-- throttle / brake bars -->
      <g transform="translate(232,8)">
        <text x="0" y="10" fill="#6b7aa3" font-size="10" font-weight="600">THR</text>
        <rect x="34" y="0" width="120" height="12" rx="6" fill="#10151f"/>
        <rect x="34" y="0" width="40" height="12" rx="6" fill="url(#green)"/>
        <text x="0" y="34" fill="#6b7aa3" font-size="10" font-weight="600">BRK</text>
        <rect x="34" y="24" width="120" height="12" rx="6" fill="#10151f"/>
        <rect x="34" y="24" width="104" height="12" rx="6" fill="#ff6b6b"/>
      </g>
    </g>

    <!-- mini track map -->
    <g transform="translate(34,196)">
      <rect x="0" y="0" width="352" height="150" rx="14" fill="#0b1120" stroke="#1e2942"/>
      <text x="14" y="22" fill="#6b7aa3" font-size="10" font-weight="700">SONOMA RACEWAY · T7 APPROACH</text>
      <path d="M40 110 C 70 40, 150 40, 170 80 S 250 130, 300 70" fill="none" stroke="#2a3556" stroke-width="10" stroke-linecap="round"/>
      <path d="M40 110 C 70 40, 150 40, 170 80" fill="none" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
      <circle cx="170" cy="80" r="7" fill="#00e08a" stroke="#04130c" stroke-width="2"/>
      <text x="186" y="84" fill="#00e08a" font-size="10" font-weight="700">YOU</text>
    </g>

    <!-- HOT alert (the P0 safety moment) -->
    <g transform="translate(34,360)">
      <rect x="0" y="0" width="352" height="78" rx="14" fill="#1a0d10" stroke="#ff6b6b" stroke-width="2"/>
      <text x="16" y="26" fill="#ff6b6b" font-size="11" font-weight="800" letter-spacing="1">P0 · HOT PATH · 5 ms</text>
      <text x="16" y="58" fill="#fff" font-size="26" font-weight="800">Brake now.</text>
      <g transform="translate(300,20)"><circle cx="18" cy="18" r="18" fill="#ff6b6b"/><text x="18" y="25" fill="#1a0d10" font-size="20" font-weight="800" text-anchor="middle">!</text></g>
    </g>

    <!-- coach panel -->
    <g transform="translate(34,450)">
      <rect x="0" y="0" width="352" height="138" rx="14" fill="#111829" stroke="#1e2942"/>
      <circle cx="28" cy="30" r="16" fill="#10231b" stroke="rgba(0,224,138,0.5)"/><text x="28" y="35" fill="#00e08a" font-size="14" font-weight="800" text-anchor="middle">AJ</text>
      <text x="56" y="26" fill="#eaf0ff" font-size="13" font-weight="700">Coach AJ</text>
      <rect x="250" y="16" width="86" height="22" rx="11" fill="#10231b" stroke="rgba(0,224,138,0.35)"/><text x="293" y="31" fill="#00e08a" font-size="10" font-weight="700" text-anchor="middle">INTERMEDIATE</text>
      <text x="18" y="64" fill="#cdd8f5" font-size="13">"You're lifting early into 7 —</text>
      <text x="18" y="84" fill="#cdd8f5" font-size="13">trust the grip through mid-corner."</text>
      <!-- lane chips -->
      <g transform="translate(18,102)" font-size="10" font-weight="700">
        <rect x="0" y="0" width="58" height="22" rx="6" fill="#1a0d10" stroke="#ff6b6b"/><text x="29" y="15" fill="#ff6b6b" text-anchor="middle">HOT</text>
        <rect x="66" y="0" width="120" height="22" rx="6" fill="#0b1722" stroke="#38bdf8"/><text x="126" y="15" fill="#38bdf8" text-anchor="middle">COLD · Gemini</text>
        <rect x="196" y="0" width="120" height="22" rx="6" fill="#1c1408" stroke="#ffb454"/><text x="256" y="15" fill="#ffb454" text-anchor="middle">FEEDFORWARD</text>
      </g>
    </g>
  </g>

  <!-- annotations -->
  <g transform="translate(540,70)" fill="#9fb0d6" font-size="14">
    <text x="0" y="0" fill="#eaf0ff" font-size="22" font-weight="800">The cockpit, mid-corner</text>
    <text x="0" y="30" fill="#6b7aa3" font-size="13">design mockup · Racecraft brand palette</text>

    <g transform="translate(0,64)">
      <circle cx="6" cy="-4" r="6" fill="#ff6b6b"/><text x="22" y="0" fill="#eaf0ff" font-weight="700">HOT path — deterministic safety</text>
      <text x="22" y="22">"Brake now" fires from the on-device DECISION_MATRIX in</text>
      <text x="22" y="42">~5&#160;ms p95 (measured on Pixel 10). No model in the loop.</text>
    </g>
    <g transform="translate(0,150)">
      <rect x="0" y="-10" width="12" height="12" rx="3" fill="#38bdf8"/><text x="22" y="0" fill="#eaf0ff" font-weight="700">COLD path — Gemini 2.5 Flash Lite</text>
      <text x="22" y="22">"Why, not what" strategy, 2–5&#160;s, off the critical path.</text>
    </g>
    <g transform="translate(0,210)">
      <rect x="0" y="-10" width="12" height="12" rx="3" fill="#ffb454"/><text x="22" y="0" fill="#eaf0ff" font-weight="700">FEEDFORWARD — geofenced</text>
      <text x="22" y="22">Velocity-scaled, fires ~150&#160;m before a known corner.</text>
    </g>
    <g transform="translate(0,270)">
      <rect x="0" y="-10" width="12" height="12" rx="3" fill="#00e08a"/><text x="22" y="0" fill="#eaf0ff" font-weight="700">DriverModel — adapts the voice</text>
      <text x="22" y="22">10&#160;s rolling window, 5&#160;s hysteresis → BEGINNER /</text>
      <text x="22" y="42">INTERMEDIATE / ADVANCED changes language &amp; cadence.</text>
    </g>
    <g transform="translate(0,356)">
      <rect x="0" y="-10" width="12" height="12" rx="3" fill="#00e08a"/><text x="22" y="0" fill="#eaf0ff" font-weight="700">On-device — Gemma 4 E2B (edge)</text>
      <text x="22" y="22">LiteRT-LM enrichment runs locally; the loop never blocks on it.</text>
    </g>
  </g>
</svg>
