<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0f1c"/><stop offset="1" stop-color="#070a12"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7aa3"/></marker>
  </defs>
  <rect width="1000" height="560" rx="14" fill="url(#bg2)"/>
  <text x="40" y="50" fill="#eaf0ff" font-size="24" font-weight="800">The Split-Brain engine</text>
  <text x="40" y="76" fill="#6b7aa3" font-size="13">Every telemetry frame fans out to three lanes against a 300–500&#160;ms budget. The loop never waits on the slow ones.</text>

  <!-- input -->
  <g transform="translate(40,150)">
    <rect x="0" y="40" width="150" height="120" rx="12" fill="#111829" stroke="#1e2942"/>
    <text x="75" y="86" fill="#eaf0ff" font-size="14" font-weight="700" text-anchor="middle">Telemetry</text>
    <text x="75" y="106" fill="#9fb0d6" font-size="11" text-anchor="middle">RaceBox BLE</text>
    <text x="75" y="122" fill="#9fb0d6" font-size="11" text-anchor="middle">GPS · IMU · camera</text>
    <text x="75" y="138" fill="#6b7aa3" font-size="10" text-anchor="middle">~50–100 Hz fused</text>
  </g>
  <line x1="190" y1="210" x2="250" y2="210" stroke="#6b7aa3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- lanes -->
  <g transform="translate(255,96)">
    <!-- HOT -->
    <rect x="0" y="0" width="360" height="74" rx="12" fill="#1a0d10" stroke="#ff6b6b" stroke-width="1.6"/>
    <text x="16" y="28" fill="#ff6b6b" font-size="13" font-weight="800">HOT &lt; 50&#160;ms · deterministic</text>
    <text x="16" y="50" fill="#f3d3d3" font-size="11.5">DECISION_MATRIX heuristics · P0 safety + P1 tactical</text>
    <text x="16" y="66" fill="#9b7e82" font-size="10.5">no network · no LLM · measured 5&#160;ms p95 on Pixel 10</text>

    <!-- COLD -->
    <rect x="0" y="86" width="360" height="74" rx="12" fill="#0b1722" stroke="#38bdf8" stroke-width="1.6"/>
    <text x="16" y="114" fill="#38bdf8" font-size="13" font-weight="800">COLD 2–5&#160;s · cloud</text>
    <text x="16" y="136" fill="#cfe8fb" font-size="11.5">Gemini 2.5 Flash Lite · "why, not what" strategy</text>
    <text x="16" y="152" fill="#7796ab" font-size="10.5">async · the loop does not block on it</text>

    <!-- FEEDFORWARD -->
    <rect x="0" y="172" width="360" height="74" rx="12" fill="#1c1408" stroke="#ffb454" stroke-width="1.6"/>
    <text x="16" y="200" fill="#ffb454" font-size="13" font-weight="800">FEEDFORWARD · geofenced</text>
    <text x="16" y="222" fill="#f6e2c2" font-size="11.5">GPS-triggered, velocity-scaled, ~150&#160;m before a corner</text>
    <text x="16" y="238" fill="#ab9166" font-size="10.5">"T7 right: late apex, brake at the 100&#160;m board"</text>
  </g>

  <!-- arrows to queue -->
  <line x1="615" y1="133" x2="690" y2="250" stroke="#6b7aa3" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="615" y1="219" x2="690" y2="250" stroke="#6b7aa3" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="615" y1="305" x2="690" y2="262" stroke="#6b7aa3" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- queue + gate -->
  <g transform="translate(695,210)">
    <rect x="0" y="0" width="150" height="104" rx="12" fill="#10231b" stroke="rgba(0,224,138,0.45)"/>
    <text x="75" y="30" fill="#00e08a" font-size="13" font-weight="800" text-anchor="middle">CoachingQueue</text>
    <text x="75" y="52" fill="#bdf0d8" font-size="11" text-anchor="middle">priority queue</text>
    <text x="75" y="72" fill="#bdf0d8" font-size="11" text-anchor="middle">P0 preempts all</text>
    <text x="75" y="90" fill="#7fccaa" font-size="10" text-anchor="middle">TimingGate gates by phase</text>
  </g>
  <line x1="845" y1="262" x2="900" y2="262" stroke="#6b7aa3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- audio out -->
  <g transform="translate(900,222)">
    <rect x="0" y="0" width="70" height="80" rx="12" fill="#111829" stroke="#1e2942"/>
    <text x="35" y="38" fill="#eaf0ff" font-size="22" text-anchor="middle">🔊</text>
    <text x="35" y="62" fill="#9fb0d6" font-size="10" text-anchor="middle">spoken</text>
  </g>

  <!-- principle -->
  <rect x="40" y="470" width="920" height="54" rx="12" fill="#0c111d" stroke="#1e2942"/>
  <text x="60" y="495" fill="#00e08a" font-size="13" font-weight="800">Design principle</text>
  <text x="60" y="515" fill="#cdd8f5" font-size="14" font-style="italic">"Feedback 800&#160;ms late is worse than silence." — so the safety lane is deterministic and never shares a thread with a model.</text>
</svg>
